<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>contact — anuvarta</title>
<meta name="description" content="get in touch with anuvarta about custom systems, infrastructure, and integrations." />
<link rel="canonical" href="https://anuvarta.com/contact.html" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" href="icon-192.png" type="image/png" sizes="192x192" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <p class="crumb" aria-label="anuvarta / contact">
      <a href="index.html" class="wordmark">anuvarta</a><span class="crumb-sep" aria-hidden="true">/</span><span class="crumb-page">contact</span>
    </p>
    <nav>
      <a href="about.html">about</a>
      <a href="work.html">work</a>
    </nav>
  </header>

  <main class="content">
    <h1>tell us</h1>
    <p class="lede">
      your project. or email us directly at <a href="mailto:dev@anuvarta.com">dev@anuvarta.com</a>
    </p>

    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name">name</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div class="form-group">
        <label for="email">email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="message">message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit">send</button>
      <p class="form-status" id="formStatus"></p>
    </form>

  </main>

<script>
document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const status = document.getElementById('formStatus');
  const button = form.querySelector('button');

  button.disabled = true;
  status.textContent = 'sending...';

  try {
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });

    const result = await response.json();

    if (response.ok) {
      status.textContent = 'sent! we\'ll get back to you soon.';
      status.style.color = 'var(--accent)';
      form.reset();
    } else {
      throw new Error(result.error || 'Unknown error');
    }
  } catch (error) {
    status.textContent = `Error: ${error.message}. Please email dev@anuvarta.com directly.`;
    status.style.color = '#e74c3c';
  } finally {
    button.disabled = false;
  }
});
</script>

</body>
</html>
