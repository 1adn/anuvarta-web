<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>contact — anuvarta</title>
<meta name="description" content="get in touch with anuvarta about custom systems, infrastructure, and integrations." />
<link rel="canonical" href="https://anuvarta.com/contact.html" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" href="icon-192.png" type="image/png" sizes="192x192" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="wordmark-group" aria-label="anuvarta home">
      <span class="wordmark">anuvarta</span>
    </a>
    <nav>
      <a href="about.html">about</a>
      <a href="contact.html" aria-current="page">contact/</a>
      <a href="work.html">work</a>
    </nav>
  </header>

  <main class="content">
    <h1>email us</h1>
    <p class="lede">
      to <a href="mailto:dev@anuvarta.com">dev@anuvarta.com</a>
    </p>

    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name">name</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div class="form-group">
        <label for="email">email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="message">message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit">send</button>
    </form>

  </main>

<script>
document.getElementById('contactForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const name = formData.get('name');
  const email = formData.get('email');
  const message = formData.get('message');
  const subject = encodeURIComponent(`New message from ${name}`);
  const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);
  window.location.href = `mailto:dev@anuvarta.com?subject=${subject}&body=${body}`;
});
</script>

</body>
</html>
