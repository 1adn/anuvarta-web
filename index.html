<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="anuvarta — systems and infrastructure built to evolve.">
    <title>anuvarta</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow {
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.04) 0%, transparent 65%);
        }
    </style>
</head>
<body class="bg-neutral-950 text-white min-h-screen selection:bg-white selection:text-black">

    <div class="fixed inset-0 glow pointer-events-none" aria-hidden="true"></div>

    <main class="relative min-h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-md text-center space-y-8 fade-in">

            <div class="space-y-3">
                <h1 class="text-5xl md:text-6xl font-medium tracking-tight">
                    <a href="mailto:reach@anuvarta.com" class="text-[#c0c0c0] hover:text-neutral-300 transition-colors">anuvarta</a>
                </h1>
                <p class="text-neutral-600 text-xs tracking-widest">systems · infrastructure · tailored</p>
            </div>

        </div>
    </main>

</body>
</html>
