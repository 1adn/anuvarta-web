
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuvarta - Coming Soon</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom animation for the fade-in effect */
        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle glow effect behind the content */
        .glow-bg {
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
        }
    </style>
</head>
<body class="bg-neutral-950 text-white h-screen w-full overflow-hidden relative selection:bg-white selection:text-black">

    <div class="absolute inset-0 glow-bg pointer-events-none"></div>

    <main class="relative z-10 h-full flex flex-col items-center justify-center px-4">
        
        <div class="w-full max-w-md text-center space-y-8 fade-in">
            
            <div class="space-y-2">
                <h1 class="text-5xl md:text-6xl font-semibold tracking-tighter">
                    Anuvarta
                </h1>
                <p class="text-neutral-500 text-sm md:text-base tracking-widest uppercase">
                    Systems • Infrastructure • Future
                </p>
            </div>

            <div class="h-px w-16 bg-neutral-800 mx-auto"></div>

            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="flex flex-col sm:flex-row gap-3">
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter your email" 
                    required
                    class="w-full bg-neutral-900/50 border border-neutral-800 text-neutral-300 placeholder-neutral-600 px-4 py-3 outline-none focus:border-neutral-500 focus:bg-neutral-900 transition-all duration-300 rounded-sm"
                >
                <button 
                    type="submit" 
                    class="bg-white text-black px-6 py-3 font-medium hover:bg-neutral-200 transition-colors duration-300 rounded-sm whitespace-nowrap"
                >
                    Notify Me
                </button>
            </form>

            <p class="text-neutral-600 text-xs pt-8">
                © 2026 Anuvarta Ltd. <br>
                <a href="mailto:contact@anuvarta.com" class="hover:text-neutral-400 transition-colors">contact@anuvarta.com</a>
            </p>
        </div>

    </main>

</body>
</html>
